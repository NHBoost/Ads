<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" fill="none" role="img" aria-label="NHBoost">
  <defs>
    <linearGradient id="nhBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BB3D6"/>
      <stop offset="100%" stop-color="#5A9CC4"/>
    </linearGradient>
    <linearGradient id="nhNavy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2E5E"/>
      <stop offset="100%" stop-color="#1A1D45"/>
    </linearGradient>
  </defs>

  <!-- NH combined mark -->
  <g fill="url(#nhBlue)">
    <rect x="8" y="6" width="28" height="148" rx="2"/>
    <rect x="128" y="6" width="28" height="148" rx="2"/>
    <polygon points="36,154 64,154 156,6 128,6"/>
    <rect x="36" y="64" width="92" height="28"/>
  </g>

  <!-- Boost wordmark -->
  <text x="186" y="124"
        fill="url(#nhNavy)"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="900"
        font-size="138"
        letter-spacing="-4">Boost</text>

  <!-- Arrow swoosh going up-right (extending from end of 't') -->
  <path d="M 632 130 Q 660 110 690 80"
        stroke="url(#nhNavy)"
        stroke-width="11"
        stroke-linecap="round"
        fill="none"/>
  <path d="M 670 72 L 700 70 L 686 96 Z"
        fill="url(#nhNavy)"/>
</svg>
